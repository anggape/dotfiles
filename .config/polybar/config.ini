[global/wm]
margin-bottom                   = 0
margin-top                      = 0

[colors]
color-0                         = #0c0d14
color-1                         = #181c28
color-2                         = #23313d
color-3                         = #33505d
color-4                         = #4e7f7d
color-5                         = #53a788
color-6                         = #70d38b
color-7                         = #cbffd8

[bar/ape]
fixed-center                    = true
font-0                          = JetBrains Mono:style=Bold:size=10;2
font-1                          = JetBrains Mono:style=ExtraBold:size=10;2
font-2                          = Symbols Nerd Font:size=10;2
scroll-up                       = bspwm.prev
scroll-down                     = bspwm.next
modules-center                  = time
modules-right                   = backlight audio battery
modules-left                    = bspwm
module-margin                   = 1
tray-position                   = left
background                      = ${colors.color-0}
foreground                      = ${colors.color-6}
; width                           = 100%:-20
width                           = 100%
height                          = 30
; offset-x                        = 10
; offset-y                        = 10
padding-right                   = 1
wm-restack                      = bspwm

[module/bspwm]
type                            = internal/bspwm
label-focused                   = %{T2}x%{T-}
label-focused-background        = ${colors.color-1}
label-focused-padding           = 1
label-occupied                  = %{T2}x%{T-}
label-occupied-foreground       = ${colors.color-3}
label-occupied-padding          = 1
label-empty                     = %{T2}x%{T-}
label-empty-foreground          = ${colors.color-2}
label-empty-padding             = 1

[module/backlight]
type                            = internal/backlight
card                            = amdgpu_bl0
format                          = <ramp> <label>
use-actual-brightness           = true
enable-scroll                   = true
ramp-0                          = %{T3}%{T-}
ramp-1                          = %{T3}%{T-}
ramp-2                          = %{T3}%{T-}
ramp-3                          = %{T3}%{T-}
ramp-foreground                 = ${colors.color-2}

[module/battery]
type                            = internal/battery
format-charging                 = <animation-charging> <label-charging>
format-discharging              = <ramp-capacity> <label-discharging>
ramp-capacity-0                 = %{T3}%{T-}
ramp-capacity-1                 = %{T3}%{T-}
ramp-capacity-2                 = %{T3}%{T-}
ramp-capacity-3                 = %{T3}%{T-}
ramp-capacity-4                 = %{T3}%{T-}
ramp-capacity-5                 = %{T3}%{T-}
ramp-capacity-6                 = %{T3}%{T-}
ramp-capacity-7                 = %{T3}%{T-}
ramp-capacity-8                 = %{T3}%{T-}
ramp-capacity-9                 = %{T3}%{T-}
ramp-capacity-foreground        = ${colors.color-2}

animation-charging-0            = %{T3}%{T-}
animation-charging-1            = %{T3}%{T-}
animation-charging-2            = %{T3}%{T-}
animation-charging-foreground   = ${colors.color-2}

low-at                          = 35
battery                         = BAT0
adapter                         = ADP0
;

[module/audio]
type                            = internal/pulseaudio
format-volume                   = <ramp-volume> <label-volume>
sink                            = alsa_output.pci-0000_00_09.2.analog-stereo
ramp-volume-0                   = %{T3}%{T-}
ramp-volume-1                   = %{T3}%{T-}
ramp-volume-2                   = %{T3}%{T-}
ramp-volume-foreground          = ${colors.color-2}

[module/time]
type                            = internal/date
date                            = %H:%M
date-alt                        = %Y-%m-%d%
