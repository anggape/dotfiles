[global/wm]
margin-bottom                   = 0
margin-top                      = 0

[colors]
color-0                         = #2E3440
color-1                         = #3B4252
color-2                         = #434C5E
color-3                         = #4C566A
color-4                         = #D8DEE9
color-5                         = #E5E9F0
color-6                         = #ECEFF4
color-7                         = #8FBCBB
color-8                         = #88C0D0
color-9                         = #81A1C1
color-10                        = #5E81AC
color-11                        = #BF616A
color-12                        = #D08770
color-13                        = #EBCB8B
color-14                        = #A3BE8C
color-15                        = #B48EAD

[bar/ape]
fixed-center                    = true
font-0                          = JetBrainsMono Nerd Font:style=Bold:size=10;2
scroll-up                       = bspwm.prev
scroll-down                     = bspwm.next
modules-left                    = bspwm window
modules-center                  = speed
modules-right                   = weather time backlight audio battery
module-margin                   = 1
tray-position                   = left
background                      = ${colors.color-0}
foreground                      = ${colors.color-7}
width                           = 100%
height                          = 30
padding-right                   = 1
wm-restack                      = bspwm

[module/bspwm]
type                            = internal/bspwm
label-focused                   = ’äæ
label-focused-padding           = 1
label-occupied                  = ’äæ
label-occupied-foreground       = ${colors.color-3}
label-occupied-padding          = 1
label-empty                     = ’äī
label-empty-foreground          = ${colors.color-12}
label-empty-padding             = 1

[module/backlight]
type                            = internal/backlight
card                            = amdgpu_bl0
format                          = <ramp> <label>
use-actual-brightness           = true
enable-scroll                   = true
ramp-0                          = ’ŚØ
ramp-1                          = ’Ś×
ramp-2                          = ’Ś£
ramp-3                          = ’Ś¤
ramp-foreground                 = ${colors.color-12}

[module/battery]
type                            = internal/battery
format-charging                 = <animation-charging> <label-charging>
format-discharging              = <ramp-capacity> <label-discharging>
format-full                     = <ramp-capacity> <label-full>
full-at                         = 100
ramp-capacity-0                 = ’Ģ╣
ramp-capacity-1                 = ’Ģ║
ramp-capacity-2                 = ’Ģ╗
ramp-capacity-3                 = ’Ģ╝
ramp-capacity-4                 = ’ĢĮ
ramp-capacity-5                 = ’ĢŠ
ramp-capacity-6                 = ’Ģ┐
ramp-capacity-7                 = ’¢Ć
ramp-capacity-8                 = ’¢ü
ramp-capacity-9                 = ’ĢĖ
ramp-capacity-foreground        = ${colors.color-12}
animation-charging-0            = ’¢ģ
animation-charging-1            = ’¢å
animation-charging-2            = ’¢ć
animation-charging-3            = ’¢ł
animation-charging-4            = ’¢ē
animation-charging-5            = ’¢ä
animation-charging-foreground   = ${colors.color-12}
