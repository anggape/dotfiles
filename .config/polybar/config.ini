[module/time]
type                            = internal/date
date                            = %{F#D08770}’ĆŚ%{F-} %H:%M
date-alt                        = %{F#D08770}’ĆŚ%{F-} %Y/%m/%d %H:%M

[module/speed]
type                            = internal/network
interface                       = wlan0
interval                        = 3.0
ping-interval                   = 3
format-connected                = <label-connected>
format-disconnected             = 
label-connected                 = ’āŚ %downspeed% %{F#D08770}/%{F-} ’āś %upspeed%

[module/weather]
type                            = custom/script
exec                            = ~/.config/polybar/plugins/weather.sh
tail                            = false
interval                        = 960

[module/window]
type                            = internal/xwindow
label-maxlen                    = 35
