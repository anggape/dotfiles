[global/wm]
margin-bottom                   = 0
margin-top                      = 0

[colors]
color-0                         = #1A001D
color-1                         = #69053C
color-2                         = #8B0A3F
color-3                         = #B01B3F
color-4                         = #D43344
color-5                         = #FC6F2B
color-6                         = #430231
color-7                         = #FEF2CA

[bar/ape]
fixed-center                    = true
font-0                          = JetBrainsMono Nerd Font:size=10;2
scroll-up                       = bspwm.prev
scroll-down                     = bspwm.next
modules-center                  = speed
modules-right                   = time backlight audio battery
modules-left                    = bspwm
module-margin                   = 1
tray-position                   = left
background                      = ${colors.color-0}
foreground                      = ${colors.color-7}
width                           = 100%
height                          = 30
padding-right                   = 1
wm-restack                      = bspwm

[module/bspwm]
type                            = internal/bspwm
label-focused                   = 
label-focused-background        = ${colors.color-1}
label-focused-padding           = 1
label-occupied                  = 
label-occupied-foreground       = ${colors.color-3}
label-occupied-padding          = 1
label-empty                     = 
label-empty-foreground          = ${colors.color-2}
label-empty-padding             = 1

[module/backlight]
type                            = internal/backlight
card                            = amdgpu_bl0
format                          = <ramp> <label>
use-actual-brightness           = true
enable-scroll                   = true
ramp-0                          = 
ramp-1                          = 
ramp-2                          = 
ramp-3                          = 
ramp-foreground                 = ${colors.color-2}

[module/battery]
type                            = internal/battery
format-charging                 = <animation-charging> <label-charging>
format-discharging              = <ramp-capacity> <label-discharging>
format-full                     = <ramp-capacity> <label-full>
full-at                         = 100
ramp-capacity-0                 = 
ramp-capacity-1                 = 
ramp-capacity-2                 = 
ramp-capacity-3                 = 
ramp-capacity-4                 = 
ramp-capacity-5                 = 
ramp-capacity-6                 = 
ramp-capacity-7                 = 
ramp-capacity-8                 = 
ramp-capacity-9                 = 
ramp-capacity-foreground        = ${colors.color-2}
animation-charging-0            = 
animation-charging-1            = 
animation-charging-2            = 
animation-charging-3            = 
animation-charging-4            = 
animation-charging-5            = 
animation-charging-foreground   = ${colors.color-2}
low-at                          = 35
battery                         = BAT0
adapter                         = ADP0

[module/audio]
type                            = internal/pulseaudio
format-volume                   = <ramp-volume> <label-volume>
format-muted                    = <label-muted> <label-volume>
label-muted                     = ﱝ
label-muted-foreground          = ${colors.color-2}
sink                            = alsa_output.pci-0000_00_09.2.analog-stereo
ramp-volume-0                   = 
ramp-volume-1                   = 
ramp-volume-2                   = 
ramp-volume-foreground          = ${colors.color-2}
click-right                     = pavucontrol

[module/time]
type                            = internal/date
date                            = %{F#23313d}%{F-} %H:%M
date-alt                        = %{F#23313d}%{F-} %Y/%m/%d %H:%M

[module/speed]
type                            = internal/network
interface                       = wlan0
interval                        = 3.0
ping-interval                   = 3
format-connected                = <label-connected>
format-disconnected             = 
label-connected                 =  %downspeed% %{F#23313d}/%{F-}  %upspeed%
