[module/audio]
type                            = internal/pulseaudio
format-volume                   = <ramp-volume> <label-volume>
format-muted                    = <label-muted> <label-volume>
label-muted                     = ’▒Ø
label-muted-foreground          = ${colors.color-12}
sink                            = alsa_output.pci-0000_00_09.2.analog-stereo
ramp-volume-0                   = ’Ć”
ramp-volume-1                   = ’Ć¦
ramp-volume-2                   = ’Ć©
