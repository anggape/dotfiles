window:
    padding:
        x: 10
        y: 10
    dimensions:
        columns: 60
        lines: 15

font:
    normal:
        family: JetBrainsMono Nerd Font
        style: Regular
    bold:
        family: JetBrainsMono Nerd Font
        style: Bold
    italic:
        family: JetBrainsMono Nerd Font
        style: Italic
    bold_italic:
        style: Bold Italic

cursor:
    style:
        blinking: On

colors:
    primary:
        background: '#0c0d14'
        foreground: '#cbffd8'
